<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Данхар ТОВ — ІТ Компанія</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Raleway:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1420;
    --accent1: #00c8ff;
    --accent2: #0055ff;
    --accent3: #001aff;
    --text: #e8f4ff;
    --muted: #5a7a99;
    --border: rgba(0,200,255,0.15);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,85,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,200,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridShift {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top accent bar */
  .card-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent3), var(--accent1));
    position: relative;
  }
  .card-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: barShine 3s ease-in-out infinite;
  }
  @keyframes barShine {
    0%, 100% { transform: translateX(-100%); }
    50% { transform: translateX(100%); }
  }

  .card-inner {
    padding: 52px 56px 48px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-mark {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
    position: relative;
  }
  .logo-mark svg {
    width: 100%;
    height: 100%;
  }

  .brand {
    flex: 1;
  }

  .company-type {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .company-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 30%, var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .company-form {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent2), var(--border), transparent);
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Team section */
  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .team {
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .person {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    cursor: default;
  }

  .person::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent1), var(--accent2));
    transition: left 0.3s cubic-bezier(0.22,1,0.36,1);
  }

  .person:hover::before { left: 0; }

  .person:hover {
    background: rgba(0,200,255,0.03);
    padding-left: 16px;
    transition: padding 0.3s cubic-bezier(0.22,1,0.36,1), background 0.3s;
  }

  .person:last-child { border-bottom: none; }

  .person-role {
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 4px;
    opacity: 0.7;
  }

  .person-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .person-phone {
    display: inline-block;
    margin-top: 5px;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--accent1);
    text-decoration: none;
    opacity: 0.75;
    transition: opacity 0.2s;
  }
  .person-phone:hover { opacity: 1; text-decoration: underline; }

  .person-tag {
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--muted);
    border: 1px solid rgba(0,200,255,0.2);
    padding: 4px 10px;
    border-radius: 1px;
    text-transform: uppercase;
  }

  /* Footer */
  .footer {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.8s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  .footer-text {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .footer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent1);
    box-shadow: 0 0 8px var(--accent1), 0 0 16px rgba(0,200,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Responsive */
  @media (max-width: 520px) {
    .card-inner { padding: 36px 28px 32px; }
    .company-name { font-size: 28px; }
    .header { gap: 16px; }
    .person-tag { display: none; }
  }
</style>
</head>
<body>

</body>
